name: ClipStack
options:
  bundleIdPrefix: com.clipstack
  deploymentTarget:
    macOS: "12.0"
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  SWIFT_VERSION: "5.9"

targets:
  ClipStack:
    type: application
    platform: macOS
    sources:
      - path: ClipStack
        excludes:
          - "**/*.md"
    resources:
      - ClipStack/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipstack.ClipStack
        MACOSX_DEPLOYMENT_TARGET: "12.0"
        INFOPLIST_FILE: ClipStack/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        ENABLE_HARDENED_RUNTIME: YES
        PRODUCT_NAME: ClipStack
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - sdk: CoreData.framework
      - sdk: ServiceManagement.framework
    entitlements:
      path: ClipStack/ClipStack.entitlements

  ClipStackTests:
    type: bundle.unit-test
    platform: macOS
    sources: [ClipStackTests]
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.clipstack.ClipStackTests
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    dependencies:
      - target: ClipStack

schemes:
  ClipStack:
    build:
      targets:
        ClipStack: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClipStackTests
    profile:
      config: Release
    archive:
      config: Release
